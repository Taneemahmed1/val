<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak My Love | A Romantic Celebration</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --accent-gold: #FFD700;
            --dark-bg: #1a1a2e;
            --deep-green: #062c1e;
            --ivory: #FFF8E7;
            --rose: #f8d7da;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--ivory);
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            scroll-snap-align: start;
            overflow: hidden;
            text-align: center;
            padding: 2rem;
        }

        /* --- Floating Particles Background --- */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .particle {
            position: absolute;
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0.6;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- Section 1: Hero --- */
        #hero {
            /* Using relative path for the image in the same folder */
            background: url('WhatsApp Image 2026-03-20 at 6.12.19 PM.jpeg') center/cover no-repeat;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            animation: fadeIn 2s ease-out;
        }

        h1.glowing-gold {
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            margin-bottom: 0.5rem;
            animation: pulse 3s infinite ease-in-out;
        }

        .sub-elegant {
            font-family: 'Amiri', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-style: italic;
            color: var(--ivory);
        }

        .divider {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 20px auto;
            position: relative;
        }

        .divider::after {
            content: '❦';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            background: transparent;
            padding: 0 10px;
        }

        /* --- Section 2: Video --- */
        #video-section {
            padding: 0;
        }

        video.bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .video-text {
            position: relative;
            z-index: 2;
            font-size: clamp(4rem, 15vw, 10rem);
            filter: blur(10px);
            animation: blurIn 1.5s forwards ease-out, heartbeat 2s infinite;
            text-shadow: 0 0 30px white;
        }

        /* --- Section 3: Gallery --- */
        #gallery {
            background: var(--deep-green);
            overflow-y: auto;
            justify-content: flex-start;
            padding-top: 5vh;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--gold);
        }

        .upload-btn-wrapper {
            margin-bottom: 3rem;
        }

        .custom-file-upload {
            background: var(--gold);
            color: var(--dark-bg);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .custom-file-upload:hover {
            background: var(--accent-gold);
            transform: scale(1.05);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .photo-item {
            position: relative;
            border: 3px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            transition: var(--transition);
            background: #222;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        .heart-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
        }

        .photo-item:hover .heart-overlay {
            opacity: 1;
        }

        .heart-overlay::after {
            content: '❤️';
            font-size: 2rem;
        }

        /* --- Section 4: Matching --- */
        #matching {
            background: linear-gradient(135deg, var(--dark-bg), #2a1a3e);
        }

        .matching-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
        }

        .portrait-box {
            width: 250px;
            height: 350px;
            border: 3px dashed var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .portrait-box:hover {
            background: rgba(212, 175, 55, 0.1);
            border-style: solid;
        }

        .portrait-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portrait-label {
            margin-top: 10px;
            color: var(--gold);
        }

        .silhouette {
            font-size: 4rem;
            opacity: 0.5;
        }

        #match-result {
            margin-top: 30px;
            font-size: 2.5rem;
            color: #ff69b4;
            display: none;
            animation: glowText 1.5s infinite alternate;
        }

        /* --- Section 5: Eidi Card --- */
        #eidi {
            background: radial-gradient(circle, #2c3e50, var(--dark-bg));
        }

        .card-container {
            perspective: 1000px;
            width: 350px;
            height: 220px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
        }

        .card-front {
            background: linear-gradient(135deg, var(--gold), #8e6d13);
            color: var(--dark-bg);
            border: 2px solid var(--accent-gold);
        }

        .card-back {
            background: var(--ivory);
            color: var(--dark-bg);
            transform: rotateY(180deg);
            border: 5px solid var(--gold);
        }

        .redeem-box {
            background: #eee;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--gold);
            border: 1px solid #ccc;
            margin: 15px 0;
            font-weight: bold;
        }

        .reveal-btn {
            background: var(--dark-bg);
            color: var(--gold);
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }

        .final-msg {
            margin-top: 50px;
            font-size: 2rem;
            background: linear-gradient(to right, var(--gold), #fff, var(--gold));
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blurIn { from { filter: blur(20px); opacity: 0; } to { filter: blur(0); opacity: 1; } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 10% { transform: scale(1.1); } 20% { transform: scale(1); } }
        @keyframes glowText { from { text-shadow: 0 0 10px #ff69b4; } to { text-shadow: 0 0 30px #ff1493, 0 0 10px white; } }
        @keyframes shimmer { to { background-position: 200% center; } }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--dark-bg);
            padding: 10px 25px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
            font-weight: bold;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .matching-container { gap: 20px; }
            .portrait-box { width: 140px; height: 200px; }
            .silhouette { font-size: 2.5rem; }
            h1.glowing-gold { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div id="particles-container"></div>
    <div id="toast">Copied to clipboard! 🌙</div>

    <!-- SECTION 1: HERO -->
    <section id="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1 class="glowing-gold">Eid Mubarak</h1>
            <p class="sub-elegant">To My Love</p>
            <div class="divider"></div>
            <p style="letter-spacing: 5px; opacity: 0.8;">🌙 ✨ 🕌</p>
        </div>
    </section>

    <!-- SECTION 2: VIDEO -->
    <section id="video-section">
        <video class="bg-video" autoplay muted loop playsinline>
            <!-- Relative path for the video in the same folder -->
            <source src="WhatsApp Video 2026-03-20 at 6.12.03 PM.mp4" type="video/mp4">
        </video>
        <div class="overlay" style="background: rgba(0,0,0,0.6);"></div>
        <div class="video-text">OMG 😍🥹</div>
    </section>

    <!-- SECTION 3: GALLERY -->
    <section id="gallery">
        <h2 class="section-title">PLEASE UPLOAD EID PICS 📸</h2>
        <div class="upload-btn-wrapper">
            <label for="gallery-upload" class="custom-file-upload">
                Upload a Photo
            </label>
            <input type="file" id="gallery-upload" accept="image/*" style="display:none;" multiple>
        </div>
        <div class="photo-grid" id="main-grid">
            <!-- Dynamic Photos -->
        </div>
    </section>

    <!-- SECTION 4: MATCHING -->
    <section id="matching">
        <h2 class="section-title">We Are Matching 💑</h2>
        <div class="matching-container">
            <div class="portrait-box" onclick="document.getElementById('upload-left').click()">
                <input type="file" id="upload-left" hidden accept="image/*">
                <div id="left-content">
                    <div class="silhouette">👤</div>
                    <div class="portrait-label">My Photo</div>
                </div>
            </div>
            <div class="portrait-box" onclick="document.getElementById('upload-right').click()">
                <input type="file" id="upload-right" hidden accept="image/*">
                <div id="right-content">
                    <div class="silhouette">👤</div>
                    <div class="portrait-label">Their Photo</div>
                </div>
            </div>
        </div>
        <div id="match-result">We Match! 💖</div>
    </section>

    <!-- SECTION 5: EIDI -->
    <section id="eidi">
        <h2 class="section-title">Eid Mubarak Once More, My Love 🌙</h2>
        <div class="card-container" id="giftCard">
            <div class="card-inner">
                <div class="card-front">
                    <h3 style="font-size: 1.8rem;">Your Eidi Is Here 🎁</h3>
                    <button class="reveal-btn">Reveal Your Gift</button>
                </div>
                <div class="card-back">
                    <p style="font-size: 0.9rem; text-transform: uppercase; color: #666;">Redeem your gift</p>
                    <div class="redeem-box" id="codeText">F9495A6EF2CF42DF</div>
                    <p style="margin-bottom: 10px;">Redeem this with me 💛</p>
                    <button class="custom-file-upload" style="padding: 5px 15px; font-size: 0.8rem;" onclick="copyCode(event)">Copy Code</button>
                </div>
            </div>
        </div>
        <div class="final-msg">Eid Mubarak 🌙✨</div>
    </section>

    <script>
        // --- Particle System ---
        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 40;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 10 + 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // --- Gallery Upload Logic ---
        const galleryInput = document.getElementById('gallery-upload');
        const mainGrid = document.getElementById('main-grid');

        galleryInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    addPhotoToGrid(event.target.result);
                };
                reader.readAsDataURL(file);
            });
        });

        function addPhotoToGrid(url) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            item.innerHTML = `
                <img src="${url}" alt="Memory">
                <div class="heart-overlay"></div>
            `;
            mainGrid.appendChild(item);
        }

        // --- Matching Logic ---
        const leftInput = document.getElementById('upload-left');
        const rightInput = document.getElementById('upload-right');
        const leftContent = document.getElementById('left-content');
        const rightContent = document.getElementById('right-content');
        let leftDone = false;
        let rightDone = false;

        function handleMatch(input, container, side) {
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    container.innerHTML = `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                    if (side === 'left') leftDone = true;
                    if (side === 'right') rightDone = true;
                    checkMatch();
                };
                reader.readAsDataURL(file);
            });
        }

        handleMatch(leftInput, leftContent, 'left');
        handleMatch(rightInput, rightContent, 'right');

        function checkMatch() {
            if (leftDone && rightDone) {
                document.getElementById('match-result').style.display = 'block';
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#D4AF37', '#FFD700', '#ffffff', '#ff69b4']
                });
            }
        }

        // --- Eidi Card Flip ---
        const giftCard = document.getElementById('giftCard');
        giftCard.addEventListener('click', () => {
            giftCard.classList.toggle('flipped');
        });

        function copyCode(elId) {
            const code = document.getElementById('codeText').innerText;
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // Intersection Observer for animations
        const observerOptions = { threshold: 0.5 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            observer.observe(section);
        });
    </script>
</body>
</html>
